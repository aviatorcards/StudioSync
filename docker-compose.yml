>>>>>>> ac5fde9 (additions)
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U studio_user -d studiosync" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # UserTour Server
  usertour:
    image: usertour/usertour:latest
    ports:
      - "8011:80"
    environment:
      DATABASE_URL: postgresql://studio_user:studio_password@db:5432/usertour?sslmode=disable
      DATABASE_DIRECT_URL: postgresql://studio_user:studio_password@db:5432/usertour?sslmode=disable
      Redis_HOST: redis
      Redis_PORT: 6379
      APP_HOMEPAGE_URL: ${USERTOUR_APP_URL:-http://localhost:8011}
      JWT_SECRET: ${USERTOUR_JWT_SECRET:-dev-secret-key-change-this}
      EMAIL_AUTH_ENABLED: "true"
      # Additional config can be added here
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://studio_user:studio_password@db:5432/studiosync
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://10.0.0.162:3000}
      # AWS / Stripe Config
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_USE_SSL: ${AWS_S3_USE_SSL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Background Task Worker
  q_cluster:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    command: python manage.py qcluster
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DATABASE_URL: postgresql://studio_user:studio_password@db:5432/studiosync
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_USERTOUR_TOKEN: ${NEXT_PUBLIC_USERTOUR_TOKEN:-}
      NEXT_PUBLIC_USERTOUR_HOST: ${NEXT_PUBLIC_USERTOUR_HOST:-}
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  media_data:
  static_data:
