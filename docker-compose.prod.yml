# Production stack: Optimized images with standalone builds
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # Django Backend
  backend:
    build:
      target: production
      network: host
    env_file: .env.prod
    environment:
      DEBUG: "False"
    restart: unless-stopped

  # Background Task Worker
  q_cluster:
    build:
      target: production
      network: host
    env_file: .env.prod
    restart: unless-stopped

