# Base stack: PostgreSQL + Django-Q worker + Django + Next.js
# This file defines the core services and their connections.
# Use docker-compose.override.yml (dev) or docker-compose.prod.yml (prod) for specific roles.

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studiosync
      POSTGRES_USER: studio_user
      POSTGRES_PASSWORD: studio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U studio_user -d studiosync" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://studio_user:studio_password@db:5432/studiosync
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://10.0.0.250:3000}
      # AWS / Stripe Config
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_USE_SSL: ${AWS_S3_USE_SSL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  # Background Task Worker
  q_cluster:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py qcluster
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DATABASE_URL: postgresql://studio_user:studio_password@db:5432/studiosync
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  media_data:
  static_data:
