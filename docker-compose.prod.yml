# Production stack: Optimized images with standalone builds
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # Django Backend
  backend:
    build:
      target: production
    env_file: .env.prod
    environment:
      DEBUG: "False"
    restart: unless-stopped

  # Background Task Worker
  q_cluster:
    build:
      target: production
    env_file: .env.prod
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      target: production
      args:
        NEXT_PUBLIC_USERTOUR_TOKEN: ${NEXT_PUBLIC_USERTOUR_TOKEN:-}
        NEXT_PUBLIC_USERTOUR_HOST: ${NEXT_PUBLIC_USERTOUR_HOST:-}
    command: node server.js
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_USERTOUR_TOKEN: ${NEXT_PUBLIC_USERTOUR_TOKEN:-}
      NEXT_PUBLIC_USERTOUR_HOST: ${NEXT_PUBLIC_USERTOUR_HOST:-}
    restart: unless-stopped

  # UserTour Server (Production Target)
  usertour:
    env_file: .env.prod
    environment:
      NODE_ENV: production
    restart: unless-stopped
